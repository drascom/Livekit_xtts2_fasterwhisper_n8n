[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
asyncio_default_fixture_loop_scope = session

# Markers
markers =
    stt: marks tests for STT service (Speaches)
    tts: marks tests for TTS service (XTTS)
    integration: marks integration tests requiring running containers
    slow: marks slow tests (TTS generation, etc.)

# Output options
addopts = -v --tb=short

# Filter warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
